name: CI 
on: 
  push: 
    branches: [master] 
  pull_request: 
    branches: [master] 
env: 
  SONAR_SCANNER_VERSION: 5.0.1.3006
jobs: 
  build: 
    runs-on: windows-latest 
    steps: 
      - name: Checkout repository 
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # or the version you need
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
      - name: Verify Java installation
        run: java -version
      - name: Set JAVA_HOME environment variable
        run: echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV
      - name: Cache files 
        uses: actions/cache@v4
        with: 
            path: | 
                ~/.sonar 
            key: ${{ runner.os }}-sonar 
            restore-keys: ${{ runner.os }}-sonar      
      - name: Run Codescan On Push 
        if: github.event_name == 'push' 
        uses: codescan-io/codescan-scanner-action@1.6
        with: 
          codeScanUrl: https://preview.codescan.io
          organization: severity
          projectKey: github-actions-sarif
          login: squ_7087cb118003e07e0db7c964529fa004db5427fc
          failOnRedQualityGate: false 
      - name: Run Codescan On PR 
        if: github.event_name == 'pull_request' 
        uses: codescan-io/codescan-scanner-action@1.6
        with: 
          codeScanUrl: https://preview.codescan.io
          organization: severity
          projectKey: github-actions-sarif
          login: squ_7087cb118003e07e0db7c964529fa004db5427fc
          scanChangedFilesOnly: true 
          failOnRedQualityGate: false
          generateSarifFile: true
          args: | 
            sonar.pullrequest.branch=${{github.head_ref}} 
            sonar.pullrequest.base=${{github.base_ref}} 
            sonar.pullrequest.key=${{github.event.number}} 
      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
            name: codescan.sarif
            path: codescan.sarif
